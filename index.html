<style>
  :root{
    --sand-light:#efe3d0;
    --sand:#dfc9a8;
    --sand-deep:#c3a179;
    --dusk-pink:#e8c4b8;
    --sky-top:#cdb9c9;
    --sky-mid:#e3cfc4;
    --ink:#17130e;
    --gold:#b8923f;
    --gold-light:#d9bc7a;
    --cream:#f6efe2;
    --card-radius:190px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Tajawal',sans-serif;
    color:var(--ink);
    overflow-x:hidden;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 30%,var(--dusk-pink) 48%,var(--sand) 62%,var(--sand-light) 100%);
    min-height:100svh;
  }

  /* الخلفية الصورية */
  .bg-photo{
    position:fixed;inset:0;z-index:1;
    width:100%;height:100%;
    object-fit:cover;object-position:center bottom;
    pointer-events:none;
  }

  /* ====== المشهد الصحراوي ====== */
  .scene{
    position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
  }
  .scene svg{position:absolute;inset:0;width:100%;height:100%}
  .moon{
    position:absolute;
    width:min(46vw,420px);height:min(46vw,420px);
    border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#fdf3e3 0%,#f3ddb9 45%,#e9c98f 100%);
    left:6%;bottom:8%;
    box-shadow:0 0 120px 40px rgba(243,221,185,.55);
    animation:breathe 9s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{box-shadow:0 0 120px 40px rgba(243,221,185,.55)}
    50%{box-shadow:0 0 150px 60px rgba(243,221,185,.75)}
  }
  .orb-sm{
    position:absolute;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fbf0dd,#e6c68d);
    box-shadow:0 0 40px 12px rgba(240,218,178,.5);
  }
  .orb-1{width:70px;height:70px;right:14%;bottom:6%}
  .orb-2{width:34px;height:34px;right:30%;bottom:16%}

  .grass{position:absolute;bottom:-4px;opacity:.85}
  .g1{right:4%;width:130px}
  .g2{right:22%;width:90px;opacity:.6}
  .g3{left:10%;width:110px;opacity:.7}
  .g4{left:32%;width:70px;opacity:.5}

  /* ====== البطاقة الزجاجية ====== */
  .stage{
    position:relative;z-index:2;
    min-height:100svh;
    display:flex;align-items:center;justify-content:center;
    padding:48px 20px;
  }
  .card{
    width:min(88vw,330px);
    border-radius:var(--card-radius);
    padding:30px 26px 34px;
    text-align:center;
    background:linear-gradient(165deg,rgba(255,252,246,.42) 0%,rgba(244,230,209,.22) 45%,rgba(210,186,152,.28) 100%);
    -webkit-backdrop-filter:blur(22px) saturate(1.15);
    backdrop-filter:blur(22px) saturate(1.15);
    border:1px solid rgba(255,253,247,.55);
    box-shadow:
      0 30px 60px -20px rgba(90,66,38,.35),
      inset 0 1px 0 rgba(255,255,255,.6);
    animation:rise .9s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes rise{
    from{opacity:0;transform:translateY(26px) scale(.97)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }

  .window{
    width:200px;height:200px;margin:0 auto 22px;
    border-radius:50%;
    overflow:hidden;
    border:1px solid rgba(255,253,247,.65);
    background:radial-gradient(circle at 50% 30%,#f9f3e7 0%,#efe4cf 60%,#e2d0b2 100%);
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 4px 18px rgba(120,92,52,.18);
  }
  .window img{width:100%;height:100%;object-fit:cover;display:block}
  .window svg{width:66%;height:66%}

  .eyebrow{
    font-size:12px;letter-spacing:.35em;
    color:rgba(23,19,14,.62);
    font-weight:400;
    text-transform:uppercase;
    font-family:'Tajawal',sans-serif;
    margin-bottom:6px;
  }
  h1{
    font-family:'Amiri',serif;
    font-weight:700;
    font-size:34px;
    line-height:1.25;
    color:var(--ink);
    margin-bottom:10px;
  }
  .sub{
    font-size:14.5px;font-weight:400;
    color:rgba(23,19,14,.72);
    line-height:1.8;
    margin-bottom:16px;
  }
  .sub b{font-weight:500;color:var(--ink)}
  .divider{
    width:34px;height:1px;margin:0 auto 16px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }
  .price{
    font-family:'Amiri',serif;
    font-size:30px;font-weight:700;
    color:var(--ink);
    margin-bottom:20px;
  }
  .price span{font-size:16px;font-family:'Tajawal',sans-serif;font-weight:400;color:rgba(23,19,14,.65)}

  .cta{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;
    padding:15px 20px;
    border-radius:999px;
    background:var(--ink);
    color:var(--cream);
    text-decoration:none;
    font-size:16.5px;font-weight:500;
    letter-spacing:.02em;
    transition:transform .25s cubic-bezier(.22,1,.36,1),box-shadow .25s,background .25s;
    box-shadow:0 12px 26px -10px rgba(23,19,14,.55);
  }
  .cta:hover{transform:translateY(-2px);background:#241d14;box-shadow:0 18px 32px -10px rgba(23,19,14,.6)}
  .cta:active{transform:translateY(0)}
  .cta:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .cta svg{width:19px;height:19px;flex-shrink:0}

  .note{
    margin-top:14px;
    font-size:12.5px;font-weight:300;
    color:rgba(23,19,14,.55);
    letter-spacing:.04em;
  }
  .note .dot{color:var(--gold);margin:0 5px}

  @media (max-width:400px){
    .window{width:170px;height:170px}
    h1{font-size:29px}
    .card{padding:26px 20px 30px}
  }
  @media (prefers-reduced-motion:reduce){
    .card,.moon{animation:none}
  }
</style>
</head>
<body>

<!-- الخلفية الصورية -->
<img class="bg-photo" src="bg.jpg" alt="" aria-hidden="true" onerror="this.remove()">

<!-- المشهد الخلفي (يظهر إذا لم توجد bg.jpg) -->
<div class="scene" aria-hidden="true">
  <div class="moon"></div>
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMax slice">

  </svg>
  <div class="orb-sm orb-1"></div>
  <div class="orb-sm orb-2"></div>
  <svg class="grass g1" viewBox="0 0 100 80"><g stroke="#7a6a4a" stroke-width="1.6" fill="none" stroke-linecap="round"><path d="M50,80 C48,50 42,30 30,12"/><path d="M52,80 C54,48 60,28 74,10"/><path d="M50,80 C50,45 49,25 50,5"/><path d="M48,80 C44,55 36,40 22,30"/><path d="M54,80 C60,55 68,42 82,34"/></g></svg>
  <svg class="grass g2" viewBox="0 0 100 80"><g stroke="#857452" stroke-width="1.4" fill="none" stroke-linecap="round"><path d="M50,80 C46,50 38,32 26,16"/><path d="M52,80 C56,46 64,30 78,14"/><path d="M50,80 C50,48 50,26 51,8"/></g></svg>
  <svg class="grass g3" viewBox="0 0 100 80"><g stroke="#7a6a4a" stroke-width="1.5" fill="none" stroke-linecap="round"><path d="M50,80 C47,52 40,34 28,18"/><path d="M52,80 C55,48 62,30 76,12"/><path d="M50,80 C50,46 49,24 50,6"/><path d="M47,80 C42,58 34,44 20,36"/></g></svg>
  <svg class="grass g4" viewBox="0 0 100 80"><g stroke="#857452" stroke-width="1.3" fill="none" stroke-linecap="round"><path d="M50,80 C46,52 40,36 30,22"/><path d="M52,80 C56,50 62,34 74,20"/></g></svg>
</div>

<!-- البطاقة -->
<main class="stage">
  <article class="card">

    <div class="window">
      <img src="product.jpg" alt="عبوة كحل الإثمد الحجازي" onerror="this.remove()">
    </div>

    <p class="eyebrow">HOUSE OF ATHMID</p>
    <h1>كحل الإثمد الحجازي الأصيل</h1>
    <p class="sub">نقاء مستوحى من إرث المدينة المنورة...<br>وفخامة صُممت لترافق جمال عينيك كل يوم</p>

    <div class="divider"></div>

    <p class="price">١١٠ <span>ر.س</span></p>

    <a class="cta" id="buy-btn" href="https://amzn.eu/d/03UWrCWQ" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 4h-2l-1 2h-2v2h1.6l2.7 9.4a2 2 0 0 0 1.9 1.6h8.6a2 2 0 0 0 1.9-1.5l2.1-7.5h-14.6l-0.9-4a2 2 0 0 0 -1.3-2z" opacity=".9"/><circle cx="10" cy="21" r="1.6"/><circle cx="17" cy="21" r="1.6"/></svg>
      اطلب الآن من أمازون
    </a>

    <p class="note">إثمد أصلي<span class="dot">·</span>مرود نحاسي<span class="dot">·</span>شحن سريع</p>

  </article>
</main>

<script>
  document.getElementById('buy-btn').addEventListener('click', function(){
    if (window.ttq) {
      ttq.track('InitiateCheckout', {
        content_name: 'كحل الإثمد الحجازي الأصيل',
        content_type: 'product',
        currency: 'SAR',
        value: 110
      });
    }
  });
</script>

</body>
</html>
